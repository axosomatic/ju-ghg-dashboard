  * { box-sizing: border-box; }

    width: 1440px;
    height: auto;
    background: #0d1b2a;

    bottom: 16px;
    z-index: 50;

    border-radius: 10px;
    padding: 10px 12px;
    font-size: 12px;
    line-height: 1.4;
    box-shadow: 0 8px 24px rgba(0,0,0,0.28);

  }
  #srcFrame {
    position: fixed;
    left: -20000px;
    top: 0;
    width: 1440px;
    height: 7000px;
    opacity: 0.001;
    pointer-events: none;
    border: 0;
  }
  .hidden {
    display: none !important;
  }
</style>

  async function loadExternalScript(targetDoc, urls) {
    for (const url of urls) {
      try {
        await new Promise((resolve, reject) => {
          const s = targetDoc.createElement('script');
          s.src = url;
          s.async = true;
          s.onload = resolve;
          s.onerror = reject;
          targetDoc.head.appendChild(s);
        });
        return;
      } catch (err) {
        console.warn('Script load failed:', url, err);
      }
    }
    throw new Error('Could not load required rendering library.');
  }

  async function ensureRendererReady() {
    let doc = iframe.contentDocument;
    let win = iframe.contentWindow;

    const start = Date.now();
    while (Date.now() - start < 20000) {
      doc = iframe.contentDocument;
      win = iframe.contentWindow;
      if (doc && doc.querySelector('.nav-tab') && doc.querySelector('.panel')) break;
      await wait(120);
    }

    if (!doc || !doc.querySelector('.nav-tab')) {
      throw new Error('The source dashboard did not initialize correctly.');
    }

    await wait(1800);

    if (!win.html2canvas) {
      setStatus('Loading canvas renderer…');
      await loadExternalScript(doc, [
        'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js',
        'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js'
      ]);
    }

    if (!win.html2canvas) {
      throw new Error('Canvas renderer library could not be loaded.');
    }

    await wait(500);
  }

  function getTabIdFromElement(el, index) {
    const onclickAttr = el.getAttribute('onclick') || '';
    const match = onclickAttr.match(/showPanel\('([^']+)'\)/);
    return match ? match[1] : (TAB_IDS[index] || ('tab_' + index));
  }

  function collectHitboxes() {
    const doc = iframe.contentDocument;
    const tabs = [...doc.querySelectorAll('.nav-tab')];
    return tabs.map((el, index) => {
      const rect = el.getBoundingClientRect();
      return {
        id: getTabIdFromElement(el, index),
        label: (el.textContent || '').trim(),
        x: rect.left,
        y: rect.top,
        w: rect.width,
        h: rect.height
      };
    });
  }

  function getHeaderDisplayHeight() {
    const doc = iframe.contentDocument;
    const header = doc.querySelector('.header');
    if (!header) return 96;
    const rect = header.getBoundingClientRect();
    return Math.max(1, Math.ceil(rect.height));
  }

  async function activateTab(id) {
    const doc = iframe.contentDocument;
    const win = iframe.contentWindow;
    const tabs = [...doc.querySelectorAll('.nav-tab')];
    const tab = tabs.find((el, index) => getTabIdFromElement(el, index) === id);

    if (!tab) throw new Error('Panel tab not found: ' + id);

    win.scrollTo(0, 0);
    tab.dispatchEvent(new win.MouseEvent('click', { bubbles: true, cancelable: true, view: win }));
    await wait(700);
    win.scrollTo(0, 0);
    await wait(200);
  }

  function getCaptureMetrics() {
    const doc = iframe.contentDocument;
    const body = doc.body;
    const html = doc.documentElement;
    return {
      width: Math.max(body.scrollWidth, body.offsetWidth, html.clientWidth, html.scrollWidth, html.offsetWidth),
      height: Math.max(body.scrollHeight, body.offsetHeight, html.clientHeight, html.scrollHeight, html.offsetHeight)
    };
  }


  function trimCanvasBottom(sourceCanvas, pixelRatioY) {
    const width = sourceCanvas.width;
    const height = sourceCanvas.height;
    const ctx = sourceCanvas.getContext('2d', { willReadFrequently: true });
    const image = ctx.getImageData(0, 0, width, height);
    const data = image.data;
    const bgR = 13, bgG = 27, bgB = 42;
    const tolerance = 10;
    const sampleStep = Math.max(1, Math.floor(width / 180));
    let lastContentRow = -1;

    for (let y = height - 1; y >= 0; y--) {
      const rowOffset = y * width * 4;
      let rowHasContent = false;
      for (let x = 0; x < width; x += sampleStep) {
        const i = rowOffset + x * 4;
        const r = data[i];
        const g = data[i + 1];
        const b = data[i + 2];
        const a = data[i + 3];
        if (a < 250 || Math.abs(r - bgR) > tolerance || Math.abs(g - bgG) > tolerance || Math.abs(b - bgB) > tolerance) {
          rowHasContent = true;
          break;
        }
      }
      if (rowHasContent) {
        lastContentRow = y;
        break;
      }
    }

    if (lastContentRow < 0) return sourceCanvas;

    const paddingPx = Math.max(8, Math.round(18 * pixelRatioY));
    const targetHeight = Math.max(1, Math.min(height, lastContentRow + 1 + paddingPx));
    if (targetHeight >= height) return sourceCanvas;

    const trimmed = document.createElement('canvas');
    trimmed.width = width;
    trimmed.height = targetHeight;
    const trimmedCtx = trimmed.getContext('2d', { alpha: false });
    trimmedCtx.imageSmoothingEnabled = true;
    trimmedCtx.imageSmoothingQuality = 'high';
    trimmedCtx.fillStyle = '#0d1b2a';
    trimmedCtx.fillRect(0, 0, width, targetHeight);
    trimmedCtx.drawImage(sourceCanvas, 0, 0, width, targetHeight, 0, 0, width, targetHeight);
    return trimmed;
  }

  async function capturePanel(id) {
    if (cache.has(id)) return cache.get(id);

    loading = true;
    setStatus('Rendering ' + (TAB_LABELS[id] || id) + ' to canvas…');
    await activateTab(id);

    const doc = iframe.contentDocument;
    const win = iframe.contentWindow;
    const body = doc.body;
    const metrics = getCaptureMetrics();
    const hitboxes = collectHitboxes();

    const shotCanvas = await win.html2canvas(body, {
      backgroundColor: '#0d1b2a',
      scale: CAPTURE_SCALE,
      useCORS: true,
      allowTaint: true,
      logging: false,
      width: metrics.width,
      height: metrics.height,
      windowWidth: metrics.width,
      windowHeight: metrics.height,
      scrollX: 0,
      scrollY: -win.scrollY
    });

    const headerDisplayHeight = getHeaderDisplayHeight();
    const pixelRatioY = shotCanvas.height / metrics.height;
    const trimmedCanvas = trimCanvasBottom(shotCanvas, pixelRatioY);
    const trimmedDisplayHeight = Math.max(1, Math.round(trimmedCanvas.height / pixelRatioY));
    const headerPixelHeight = Math.max(1, Math.round(headerDisplayHeight * pixelRatioY));

    const shot = {
      id,
      canvas: trimmedCanvas,
      width: trimmedCanvas.width,
      height: trimmedCanvas.height,
      displayWidth: metrics.width,
      displayHeight: trimmedDisplayHeight,
      headerDisplayHeight,
      headerPixelHeight,
      hitboxes
    };
    cache.set(id, shot);
    loading = false;
    return shot;
  }


  function syncFixedHeader() {
    if (!currentShot) return;
    const rect = viewport.getBoundingClientRect();
    headerCanvas.style.left = Math.round(rect.left) + 'px';
    headerCanvas.style.top = '0px';
    headerCanvas.style.width = currentShot.displayWidth + 'px';
    headerCanvas.style.height = Math.min(currentShot.headerDisplayHeight || 1, currentShot.displayHeight - 1) + 'px';
  }

  function drawShot(shot) {
    currentShot = shot;
    currentId = shot.id;

    const headerPx = Math.min(shot.headerPixelHeight || 1, shot.height - 1);
    const headerDisplay = Math.min(shot.headerDisplayHeight || 1, shot.displayHeight - 1);
    const bodyPx = Math.max(1, shot.height - headerPx);
    const bodyDisplay = Math.max(1, shot.displayHeight - headerDisplay);

    viewport.style.width = shot.displayWidth + 'px';
    viewport.style.maxWidth = 'none';

    viewport.style.paddingTop = headerDisplay + 'px';

    headerCanvas.width = shot.width;
    headerCanvas.height = headerPx;
    headerCanvas.style.width = shot.displayWidth + 'px';
    headerCanvas.style.height = headerDisplay + 'px';
    headerCtx.imageSmoothingEnabled = true;
    headerCtx.imageSmoothingQuality = 'high';
    headerCtx.fillStyle = '#0d1b2a';
    headerCtx.fillRect(0, 0, shot.width, headerPx);
    headerCtx.drawImage(shot.canvas, 0, 0, shot.width, headerPx, 0, 0, shot.width, headerPx);

    stage.width = shot.width;
    stage.height = bodyPx;
    stage.style.width = shot.displayWidth + 'px';
    stage.style.height = bodyDisplay + 'px';
    stageCtx.imageSmoothingEnabled = true;
    stageCtx.imageSmoothingQuality = 'high';
    stageCtx.fillStyle = '#0d1b2a';
    stageCtx.fillRect(0, 0, shot.width, bodyPx);
    stageCtx.drawImage(shot.canvas, 0, headerPx, shot.width, bodyPx, 0, 0, shot.width, bodyPx);

    syncFixedHeader();
    setStatus('Canvas-rendered view active: ' + (TAB_LABELS[shot.id] || shot.id), false);
  }

  async function openPanel(id) {
    if (loading || id === currentId) return;
    const token = ++renderToken;
    try {
      const shot = await capturePanel(id);
      if (token !== renderToken) return;
      drawShot(shot);
    } catch (err) {
      console.error(err);
      setStatus('Canvas rendering failed for ' + (TAB_LABELS[id] || id) + '.');
    }
  }

  function locateTabAtEvent(evt) {
    if (!currentShot) return null;
    const rect = stage.getBoundingClientRect();
    const bodyDisplay = Math.max(1, currentShot.displayHeight - (currentShot.headerDisplayHeight || 0));
    const scaleX = currentShot.displayWidth / rect.width;
    const scaleY = bodyDisplay / rect.height;
    const x = (evt.clientX - rect.left) * scaleX;
    const y = ((evt.clientY - rect.top) * scaleY) + (currentShot.headerDisplayHeight || 0);
    return currentShot.hitboxes.find(h => x >= h.x && x <= h.x + h.w && y >= h.y && y <= h.y + h.h) || null;
  }

  stage.addEventListener('mousemove', evt => {
    const hit = locateTabAtEvent(evt);
    stage.style.cursor = hit ? 'pointer' : 'default';
  });

  stage.addEventListener('click', evt => {
    const hit = locateTabAtEvent(evt);
    if (hit) openPanel(hit.id);
  });

  window.addEventListener('keydown', evt => {
    if (!currentShot) return;
    const order = currentShot.hitboxes.map(h => h.id);
    const idx = order.indexOf(currentId);
    if (evt.key === 'ArrowRight' && idx >= 0 && idx < order.length - 1) {
      evt.preventDefault();
      openPanel(order[idx + 1]);
    } else if (evt.key === 'ArrowLeft' && idx > 0) {
      evt.preventDefault();
      openPanel(order[idx - 1]);
    }
  });


  window.addEventListener('scroll', syncFixedHeader, { passive: true });
  window.addEventListener('resize', syncFixedHeader);

  async function boot() {
    setStatus('Loading protected source dashboard…');
    const html = decodeSourceHtml();
    const doc = iframe.contentDocument || iframe.contentWindow.document;
    doc.open();
    doc.write(html);
    doc.close();
    await wait(300);
    await ensureRendererReady();
    const overviewShot = await capturePanel('overview');
    drawShot(overviewShot);
  }

  boot().catch(err => {
    console.error(err);
    setStatus('Could not initialize canvas-rendered dashboard. Check that internet access is available for the dashboard libraries.');
  });
})();
</script>
</body>
</html>
